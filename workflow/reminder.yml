name: Slack Daily Reminder

on:
  schedule:
    # GitHub Actions cron läuft IMMER in UTC. Wir wollen 10:00 Europe/Berlin.
    # Damit der Job sowohl in Sommer- (CEST = UTC+2) als auch Winterzeit
    # (CET = UTC+1) zur richtigen lokalen Zeit feuert, definieren wir zwei
    # Cron-Trigger. Das Skript prüft dann selbst, ob die Berliner Stunde 10
    # ist, und sendet sonst nichts.
    #
    # Wochentage in Cron: 0=So, 4=Do, 5=Fr, 6=Sa
    - cron: '0 8 * * 4,5,6,0'   # 10:00 CEST (Sommer)
    - cron: '0 9 * * 4,5,6,0'   # 10:00 CET  (Winter)

  # Erlaubt manuelles Triggern aus dem GitHub-UI heraus (Actions-Tab).
  # Praktisch zum Testen.
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Run reminder
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          REMINDER_TOPIC: ${{ vars.REMINDER_TOPIC }}
        run: python reminder.py

