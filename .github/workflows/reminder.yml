name: Slack Daily Reminder
on:
  schedule:
    # GitHub Actions Cron ist UTC und verspaetet sich routinemaessig 1-3 Stunden.
    # Wir feuern deshalb mehrfach im Vormittag/Mittag - das Skript ist idempotent
    # (sendet pro Tag hoechstens einmal, dank sent_today-Check).
    # Donnerstag-Sonntag = Wochentage 4,5,6,0
    - cron: '0 7 * * 4,5,6,0'   #  9:00 Berlin Sommer / 8:00 Winter
    - cron: '0 9 * * 4,5,6,0'   # 11:00 Berlin Sommer / 10:00 Winter
    - cron: '0 11 * * 4,5,6,0'  # 13:00 Berlin Sommer / 12:00 Winter
  workflow_dispatch:
    inputs:
      force:
        description: 'Test-Send: Wochentag-Check ueberspringen'
        type: boolean
        default: false
jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet requests
      - env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          REMINDER_TOPIC: ${{ vars.REMINDER_TOPIC }}
          FORCE_RUN: ${{ inputs.force }}
        run: python reminder.py
